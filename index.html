<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
  =============================================
    LIONWYRM PORTFOLIO
    Desenvolvido para Lucas (LionWyrm)
    Paleta Y2K + Pixel Art · 2025-2026
  =============================================
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO básico — edite conforme necessário -->
  <title>Portfólio LionWyrm</title>
  <meta name="description" content="Portfólio de Lucas (LionWyrm) — designer digital, game designer e ilustrador." />
  <meta name="author" content="Lucas – LionWyrm" />

  <!-- Open Graph (pré-visualização ao compartilhar links) -->
  <meta property="og:title"       content="Portfólio LionWyrm" />
  <meta property="og:description" content="Arte, Games, Trabalhos e Eventos." />
  <meta property="og:type"        content="website" />

  <!-- Fonte Inter do Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS principal -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Favicon (placeholder — substitua pelo seu) -->
  <!-- <link rel="icon" type="image/png" href="assets/favicon.png" /> -->

  <style>
    /*
      PIXEL ART DECORATIVO – elementos de fundo
      (puramente visuais, não afetam o conteúdo)
    */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      /* Grade pontilhada sutil */
      background-image: radial-gradient(
        rgba(148,53,242,0.12) 1px,
        transparent 1px
      );
      background-size: 32px 32px;
    }

    /* Garante que o conteúdo fique acima da grade */
    .topbar, #app { position: relative; z-index: 1; }
  </style>
</head>

<body>

  <!-- Grade pontilhada de fundo (efeito Y2K/tech) -->
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- ============================================
       TOPBAR – Montada dinamicamente pelo JS
       (js/app.js > buildTopbar)
       ============================================ -->
  <header class="topbar" role="banner">
    <!-- Conteúdo injetado pelo JavaScript -->
  </header>

  <!-- ============================================
       APP – Todas as páginas são renderizadas aqui
       pelo roteador em js/app.js
       ============================================ -->
  <main id="app" role="main" aria-live="polite">
    <!-- Conteúdo dinâmico das páginas -->
  </main>

  <!-- ============================================
       RODAPÉ
       ============================================ -->
  <footer>
    <span>LIONWYRM</span> · Portfólio 2026 · Feito com 🎨 e muito pixel art
  </footer>

  <!--
    ============================================
    SCRIPTS
    Ordem importante:
    1. data.js   → carrega os dados do portfólio
    2. app.js    → roteador e renderizador
    ============================================
  -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
